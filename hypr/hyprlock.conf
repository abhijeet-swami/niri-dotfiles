source = $HOME/.config/hypr/colors.conf

background {
    monitor =
    path = $HOME/Pictures/Wallpapers/current
    blur_size = 4
    blur_passes = 4
    contrast = 0.8916
    brightness = 0.6172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

general {
    ignore_empty_input = true
    hide_cursor = true
}

animations {
    animation = fade,    1, 6, default
    animation = fadeIn,  1, 6, default
    animation = fadeOut, 1, 6, default
}

label {
    monitor =
    text = <span> </span>
    color = $accent_soft
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 2, -150
    halign = center
    valign = top
}

# image {
