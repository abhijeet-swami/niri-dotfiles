label {
    monitor =
    text = $TIME
    color = $accent
    font_size = 140
    font_family = JetBrainsMono Nerd Font
    position = 0, 260
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = $accent_soft
    font_size = 30
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = Hi, $USER
    color = $foreground
    font_size = 25
    font_family = JetBrainsMono Nerd Font
    position = 0, -250
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 55
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $subtle
    inner_color = $background
    font_color = $foreground
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text = Enter Password
    fail_color = $critical
    fail_text = wrong password
    capslock_color = $warning
    check_color = $accent
    hide_input = false
    position = 0, -330
    halign = center
    valign = center
}

auth {
    fingerprint {
        enabled = true
    }
}
