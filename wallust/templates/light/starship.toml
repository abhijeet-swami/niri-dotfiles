add_newline = true
command_timeout = 200
format = "[$directory$git_branch$git_status]($style)$character"

[character]
error_symbol   = "[✗](bold #{{color6 | darken(0.4) | saturate(0.5) | strip}})"
success_symbol = "[❯](bold #{{color6 | darken(0.4) | saturate(0.5) | strip}})"

[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style   = "bold #{{color6 | darken(0.4) | saturate(0.5) | strip}}"
repo_root_format  = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
style             = "bold #{{color6 | darken(0.4) | saturate(0.5) | strip}}"

[git_branch]
format = "[$branch]($style) "
style  = "italic #{{color6 | darken(0.4) | saturate(0.5) | strip}}"

[git_status]
format     = '[$all_status]($style)'
style      = "#{{color6 | darken(0.4) | saturate(0.5) | strip}}"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""
