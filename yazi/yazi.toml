[opener]
play = [{ run = 'mpv "$@"', orphan = true, for = "unix" }]
edit = [{ run = 'nvim "$@"', desc = "nvim", block = true, for = "unix" }]
open = [{ run = 'xdg-open "$1"', desc = "Open", for = "unix" }]
reveal = [
  { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal", for = "unix" },
  { run = '''exiftool "$1"; echo "Press enter to exit"; read _''', block = true, desc = "Show EXIF", for = "unix" },
]
pdf = [{ run = 'zathura "$1"', desc = "Open with Zathura", for = "unix" }]
markdown = [
  { run = 'bat --style=full --paging=always "$1"', desc = "View with bat", block = true, for = "unix" },
]
extract = [
  { run = '7z x "$1"', block = true, desc = "Extract with 7z", for = "unix" },
]
view_archive = [
  { run = 'case "$1" in *.tar) tar tf "$1" ;; *.zip) unzip -l "$1" ;; *.7z) 7z l "$1" ;; esac; echo "Press enter to exit"; read _', block = true, desc = "View archive contents", for = "unix" },
]

[open]
rules = [
  { name = "*/", use = [
    "open",
    "edit",
    "reveal",
  ] },
  { mime = "text/markdown", use = [
    "markdown",
    "edit",
    "reveal",
  ] },
  { mime = "text/*", use = [
    "edit",
    "reveal",
  ] },
  { mime = "image/*", use = [
    "open",
    "reveal",
  ] },
  { mime = "video/*", use = [
    "play",
    "reveal",
  ] },
  { mime = "audio/*", use = [
    "play",
    "reveal",
  ] },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [
    "extract",
    "view_archive",
    "reveal",
  ] },
  { mime = "application/pdf", use = [
    "pdf",
    "reveal",
  ] },
  { mime = "application/{json,ndjson}", use = [
    "edit",
    "reveal",
  ] },
  { mime = "*/javascript", use = [
    "edit",
    "reveal",
  ] },
  { mime = "inode/empty", use = [
    "edit",
    "reveal",
  ] },
  { name = "*", use = [
    "open",
    "reveal",
  ] },
]

[mgr]
show_hidden = true
show_symlink = true

[preview]
tab_size = 2
max_width = 1200
max_height = 900
